<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>NeuroTech Robotics — Home</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  
<header>
  <div class="header-container">
    <img class="img-in1" src="BCO.03f7e8b6-4741-4c21-8ac9-8d787a278490.png" alt="NeuroTech Robotics logo"/>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <button class="navbar-toggler" type="button" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <nav class="navigation-box"><a class="nav-link" href="index.html">Home</a></nav>
          <nav class="navigation-box"><a class="nav-link" href="aboutUs.html">About</a></nav>
          <nav class="navigation-box"><a class="nav-link" href="projects.html">Projects</a></nav>
          <nav class="navigation-box"><a class="nav-link" href="events.html">Events</a></nav>
          <nav class="navigation-box"><a class="nav-link" href="feedback.html">Feedback</a></nav>
          <button class="register-btn" id="openRegister">Register Now</button>
        </div>
      </div>
    </nav>
  </div>
</header>

<main class="container my-5">
  <section class="hero-section">
    <h1>WIRED FOR INNOVATION, DRIVEN BY PURPOSE</h1>
    <p class="lead">Empowering young engineers and innovators in Botswana through hands-on robotics development.</p>
    <a href="aboutUs.html" class="cta-link">Learn More About Our Mission</a>
  </section>
</main>

<div id="registerModal" style="display:none;position:fixed;z-index:999;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,0.8);">
  <div style="background-color:#1a1a1a;margin:10% auto;padding:20px;border:1px solid #00ced1;width:50%;color:white;">
    <span id="closeBtn" style="float:right;cursor:pointer;font-size:24px;">&times;</span>
    <h2>NeuroTech Robotics Registration</h2>
    <form action="https://formspree.io/f/xpqbgebg" method="post">
      <input type="text" name="fullname" placeholder="Your Full Name" required aria-label="Full Name"><br><br>
      <input type="email" name="email" placeholder="Your Email Address" required aria-label="Email Address"><br><br>
      <input type="number" name="Age" placeholder="Your Age" aria-label="Age"><br><br>
      <button type="submit">Submit</button>
    </form>
  </div>
</div>

<script>
    const btn = document.getElementById("openRegister");
    const modal = document.getElementById("registerModal");
    const close = document.getElementById("closeBtn");
    btn.onclick = () => modal.style.display = "block";
    close.onclick = () => modal.style.display = "none";
</script>
</body>
</html>
